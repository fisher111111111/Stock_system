stages:
  - test
  - deploy

variables:
  PYTHONIOENCODING: "utf-8"

# БЛОК ТЕСТИРОВАНИЯ
run_tests:
  stage: test
  tags:
    - stock_db

  # Кэшируем только кеш pip, а не само окружение
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - .venv/pip-cache/

  before_script:
    - echo "DRIVER_NAME=ODBC Driver 17 for SQL Server" > .env
    - echo "SERVER_NAME=$SERVER_NAME" >> .env
    - echo "DATABASE_NAME=$DATABASE_NAME" >> .env
    - echo "DB_USER=$DB_USER" >> .env
    - echo "DB_PASSWORD=$DB_PASSWORD" >> .env

  script:
    - echo "--- Подготовка окружения ---"
    # Создаем venv всегда, чтобы избежать проблем с путями из кэша
    - python -m venv .venv

    - echo "--- Установка зависимостей ---"
    # 🔥 Одна команда: установка зависимостей с использованием кеша
    # Используем прямые слеши / для надёжности в YAML и PowerShell
    - .venv/Scripts/pip install --cache-dir .venv/pip-cache/ -r requirements.txt

    # 🔥 ВАЖНО: Установка браузеров для Playwright
    - .venv/Scripts/playwright install chromium

    - echo "--- Запуск автотестов ---"
    # Запускаем pytest из виртуального окружения (полный путь)
    - .venv/Scripts/pytest --disable-warnings --html=report.html --self-contained-html

  # Сохраняем отчёт о тестах как артефакт
  artifacts:
    when: always
    paths:
      - report.html
    expire_in: 7 days

  # Современный синтаксис вместо устаревшего only
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# БЛОК ОТПРАВКИ В GITHUB
push_to_github:
  stage: deploy
  tags:
    - stock_db
  script:
    - |
      $remoteUrl = "https://fisher111111111:${env:GH_TOKEN}@github.com/fisher111111111/Stock_system.git"
      if (git remote | Select-String "github_remote") {
          git remote set-url github_remote $remoteUrl
      } else {
          Write-Output "Репозиторий github_remote не найден, добавляю..."
          git remote add github_remote $remoteUrl
      }
      git push github_remote HEAD:main
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  when: on_success