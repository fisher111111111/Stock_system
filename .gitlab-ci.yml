stages:
  - test
  - deploy

variables:
  PYTHONIOENCODING: "utf-8"

# БЛОК ТЕСТИРОВАНИЯ
run_tests:
  stage: test
  tags:
    - stock_db

  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - .venv/
  script:
    - echo "--- Подготовка окружения ---"
    - if (!(Test-Path ".venv")) { python -m venv .venv }

    - echo "--- Установка зависимостей ---"
    - .venv\Scripts\pip install --upgrade pip
    - .venv\Scripts\pip install -r requirements.txt

    - echo "--- Запуск автотестов ---"
    - .venv\Scripts\pytest --disable-warnings
    # при необходимости можно добавить --maxfail=1
  only:
    - main

# БЛОК ОТПРАВКИ В GITHUB
push_to_github:
  stage: deploy
  tags:
    - stock_db
  script:
    - |
      $remoteUrl = "https://fisher111111111:${env:GH_TOKEN}@github.com/fisher111111111/Stock_system.git"
      if (git remote | Select-String "github_remote") {
          git remote set-url github_remote $remoteUrl
      } else {
          Write-Output "Репозиторий github_remote не найден, добавляю..."
          git remote add github_remote $remoteUrl
      }
      git push github_remote HEAD:main
  only:
    - main
  when: on_success